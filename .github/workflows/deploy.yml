name: Deploy Quantumanic

on:
  push:
    branches:
      - main      # → prod
      - develop   # → test
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options: [test, prod]

permissions:
  id-token: write   # required for OIDC AWS auth
  contents: read

# ── Resolve target environment from branch or manual input ───────────────────
jobs:
  setup:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=test" >> $GITHUB_OUTPUT
          fi

# ── Build and deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ needs.setup.outputs.environment }}
    needs: setup
    runs-on: ubuntu-latest

    # Activates the matching GitHub Environment (Settings → Environments → test/prod)
    # Each environment holds its own secrets (e.g. test uses sk_test_*, prod uses sk_live_*)
    environment: ${{ needs.setup.outputs.environment }}

    env:
      DEPLOY_ENV:     ${{ needs.setup.outputs.environment }}
      AWS_REGION:     ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      # Terraform variables — resolved from the active GitHub Environment's secrets
      TF_VAR_environment:               ${{ needs.setup.outputs.environment }}
      TF_VAR_aws_account_id:            ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_aws_region:                ${{ secrets.AWS_REGION }}
      TF_VAR_anthropic_api_key:         ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_google_api_key:            ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_sporttsdataio_api_key:     ${{ secrets.SPORTTSDATAIO_API_KEY }}
      TF_VAR_supabase_url:              ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_anon_key:         ${{ secrets.SUPABASE_ANON_KEY }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_stripe_secret_key:         ${{ secrets.STRIPE_SECRET_KEY }}
      TF_VAR_stripe_webhook_secret:     ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      TF_VAR_stripe_price_id:           ${{ secrets.STRIPE_PRICE_ID }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Bootstrap ECR repo (first-run only) ────────────────────────────
      - name: Ensure ECR repository exists
        run: |
          REPO="quantumanic-${DEPLOY_ENV}-backend"
          aws ecr describe-repositories --repository-names "$REPO" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository --repository-name "$REPO" \
               --region "$AWS_REGION" \
               --image-scanning-configuration scanOnPush=true

      # ── 5. Build & push Docker image ──────────────────────────────────────
      - name: Build and push backend image
        id: docker-build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          REPO="quantumanic-${DEPLOY_ENV}-backend"
          docker build \
            -t "$ECR_REGISTRY/$REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$REPO:latest" .
          docker push "$ECR_REGISTRY/$REPO:latest"
          docker push "$ECR_REGISTRY/$REPO:$IMAGE_TAG"

      # ── 6. Terraform ─────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${AWS_ACCOUNT_ID}-terraform-state" \
            -backend-config="key=quantumanic/${DEPLOY_ENV}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # ── 7. Capture Terraform outputs ──────────────────────────────────────
      - name: Get deployment URLs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_url)"                       >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"       >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"           >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      # ── 8. Build frontend ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL:           ${{ steps.tf-outputs.outputs.api_url }}
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      # ── 9. Deploy frontend to S3 ──────────────────────────────────────────
      - name: Deploy frontend to S3
        run: |
          BUCKET="${{ steps.tf-outputs.outputs.frontend_bucket }}"

          # Assets (JS/CSS/images) — long cache, immutable
          aws s3 sync frontend/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html — never cache so users always get the latest shell
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── 10. Invalidate CloudFront cache ───────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-outputs.outputs.cf_dist_id }}" \
            --paths "/*"

      # ── 11. Summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## Deployed to \`${DEPLOY_ENV}\`" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ steps.tf-outputs.outputs.cf_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ steps.tf-outputs.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY
