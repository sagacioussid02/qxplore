name: Deploy Quantumanic

on:
  push:
    branches:
      - main     # → test then prod (with approval gate)
      - develop  # → test only
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options: [test, prod]

permissions:
  id-token: write
  contents: read

# ── Shared env blocks ─────────────────────────────────────────────────────────
# Each job declares its own env block so GitHub resolves secrets from the
# correct environment (test vs prod). The secret NAMES are identical in both
# environments; only the VALUES differ (e.g. USE_CUSTOM_DOMAIN=false in test).

# ── Job 1: Plan for test (informational — shows what will change) ─────────────
jobs:
  plan-test:
    name: Plan → test
    runs-on: ubuntu-latest
    environment: test
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'test'

    env:
      DEPLOY_ENV:     test
      AWS_REGION:     ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_environment:               test
      TF_VAR_aws_account_id:            ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_aws_region:                ${{ secrets.AWS_REGION }}
      TF_VAR_anthropic_api_key:         ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_google_api_key:            ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_sporttsdataio_api_key:     ${{ secrets.SPORTTSDATAIO_API_KEY }}
      TF_VAR_supabase_url:              ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_anon_key:         ${{ secrets.SUPABASE_ANON_KEY }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_stripe_secret_key:         ${{ secrets.STRIPE_SECRET_KEY }}
      TF_VAR_stripe_webhook_secret:     ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      TF_VAR_stripe_price_id:           ${{ secrets.STRIPE_PRICE_ID }}
      TF_VAR_stripe_credits_per_pack:   "5000"
      TF_VAR_use_custom_domain:         ${{ secrets.USE_CUSTOM_DOMAIN }}
      TF_VAR_root_domain:               ${{ secrets.ROOT_DOMAIN }}
      TF_VAR_zone_domain:               ${{ secrets.ZONE_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (verify only)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          REPO="quantumanic-test-backend"
          docker build \
            -t "$ECR_REGISTRY/$REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$REPO:latest" .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${AWS_ACCOUNT_ID}-terraform-state" \
            -backend-config="key=quantumanic/test/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan -no-color 2>&1 | tee plan-output.txt
          echo "## Terraform Plan — \`test\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -60 plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# ── Job 2: Apply to test environment (auto — no required reviewers) ───────────
  apply-test:
    name: Apply → test
    needs: plan-test
    runs-on: ubuntu-latest
    environment: test
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'test'

    env:
      DEPLOY_ENV:     test
      AWS_REGION:     ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_environment:               test
      TF_VAR_aws_account_id:            ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_aws_region:                ${{ secrets.AWS_REGION }}
      TF_VAR_anthropic_api_key:         ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_google_api_key:            ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_sporttsdataio_api_key:     ${{ secrets.SPORTTSDATAIO_API_KEY }}
      TF_VAR_supabase_url:              ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_anon_key:         ${{ secrets.SUPABASE_ANON_KEY }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_stripe_secret_key:         ${{ secrets.STRIPE_SECRET_KEY }}
      TF_VAR_stripe_webhook_secret:     ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      TF_VAR_stripe_price_id:           ${{ secrets.STRIPE_PRICE_ID }}
      TF_VAR_stripe_credits_per_pack:   "5000"
      TF_VAR_use_custom_domain:         ${{ secrets.USE_CUSTOM_DOMAIN }}
      TF_VAR_root_domain:               ${{ secrets.ROOT_DOMAIN }}
      TF_VAR_zone_domain:               ${{ secrets.ZONE_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${AWS_ACCOUNT_ID}-terraform-state" \
            -backend-config="key=quantumanic/test/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -backend-config="encrypt=true"

      # Create ECR repo before pushing — App Runner needs the image to exist at service creation
      - name: Ensure ECR repo exists
        working-directory: terraform
        run: |
          terraform apply \
            -target=module.apprunner.aws_ecr_repository.backend \
            -auto-approve \
            -no-color

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          REPO="quantumanic-test-backend"
          docker build \
            -t "$ECR_REGISTRY/$REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$REPO:latest" .
          docker push "$ECR_REGISTRY/$REPO:latest"
          docker push "$ECR_REGISTRY/$REPO:$IMAGE_TAG"

      - name: Terraform apply
        working-directory: terraform
        run: |
          for attempt in 1 2 3; do
            echo "Terraform apply attempt $attempt/3"
            terraform apply -auto-approve -no-color && break
            EXIT=$?
            if [ $attempt -lt 3 ]; then
              echo "Apply failed (exit $EXIT) — waiting 90s for App Runner operation to complete..."
              sleep 90
            else
              echo "All 3 attempts failed."
              exit $EXIT
            fi
          done

      - name: Get deployment URLs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_url)"                       >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"       >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"           >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL:           ${{ steps.tf-outputs.outputs.api_url }}
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3
        run: |
          BUCKET="${{ steps.tf-outputs.outputs.frontend_bucket }}"
          aws s3 sync frontend/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-outputs.outputs.cf_dist_id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Deployed to \`test\`" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ steps.tf-outputs.outputs.cf_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ steps.tf-outputs.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY

# ── Job 3: Deploy to prod (single approval click — environment: prod gate) ────
# Runs only on pushes to main (or workflow_dispatch targeting prod).
# environment: prod blocks here until an approver clicks "Review deployments".
# Check the plan-test job summary to understand infrastructure changes before approving.
  deploy-prod:
    name: Deploy → prod
    needs: apply-test
    runs-on: ubuntu-latest
    environment: prod
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')

    env:
      DEPLOY_ENV:     prod
      AWS_REGION:     ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_environment:               prod
      TF_VAR_aws_account_id:            ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_aws_region:                ${{ secrets.AWS_REGION }}
      TF_VAR_anthropic_api_key:         ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_google_api_key:            ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_sporttsdataio_api_key:     ${{ secrets.SPORTTSDATAIO_API_KEY }}
      TF_VAR_supabase_url:              ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_anon_key:         ${{ secrets.SUPABASE_ANON_KEY }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_stripe_secret_key:         ${{ secrets.STRIPE_SECRET_KEY }}
      TF_VAR_stripe_webhook_secret:     ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      TF_VAR_stripe_price_id:           ${{ secrets.STRIPE_PRICE_ID }}
      TF_VAR_stripe_credits_per_pack:   "5000"
      TF_VAR_use_custom_domain:         ${{ secrets.USE_CUSTOM_DOMAIN }}
      TF_VAR_root_domain:               ${{ secrets.ROOT_DOMAIN }}
      TF_VAR_zone_domain:               ${{ secrets.ZONE_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${AWS_ACCOUNT_ID}-terraform-state" \
            -backend-config="key=quantumanic/prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan -no-color 2>&1 | tee plan-output.txt
          echo "## Terraform Plan — \`prod\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -60 plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Create ECR repo before pushing — App Runner needs the image to exist at service creation
      - name: Ensure ECR repo exists
        working-directory: terraform
        run: |
          terraform apply \
            -target=module.apprunner.aws_ecr_repository.backend \
            -auto-approve \
            -no-color

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          REPO="quantumanic-prod-backend"
          docker build \
            -t "$ECR_REGISTRY/$REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$REPO:latest" .
          docker push "$ECR_REGISTRY/$REPO:latest"
          docker push "$ECR_REGISTRY/$REPO:$IMAGE_TAG"

      - name: Terraform apply
        working-directory: terraform
        run: |
          for attempt in 1 2 3; do
            echo "Terraform apply attempt $attempt/3"
            terraform apply -auto-approve -no-color && break
            EXIT=$?
            if [ $attempt -lt 3 ]; then
              echo "Apply failed (exit $EXIT) — waiting 90s for App Runner operation to complete..."
              sleep 90
            else
              echo "All 3 attempts failed."
              exit $EXIT
            fi
          done

      - name: Get deployment URLs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_url)"                       >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"       >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"           >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL:           ${{ steps.tf-outputs.outputs.api_url }}
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3
        run: |
          BUCKET="${{ steps.tf-outputs.outputs.frontend_bucket }}"
          aws s3 sync frontend/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-outputs.outputs.cf_dist_id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Deployed to \`prod\` ✓" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ steps.tf-outputs.outputs.cf_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ steps.tf-outputs.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY
