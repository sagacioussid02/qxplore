<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background pill -->
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="26" stroke="#00ffff" stroke-width="1" opacity="0.25"/>

  <!-- Orbital ellipses -->
  <ellipse cx="32" cy="32" rx="24" ry="9"
           stroke="#00ffff" stroke-width="1.4" opacity="0.6"/>
  <ellipse cx="32" cy="32" rx="24" ry="9"
           stroke="#8b5cf6" stroke-width="1.4" opacity="0.6"
           transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="24" ry="9"
           stroke="#00ffff" stroke-width="1.4" opacity="0.4"
           transform="rotate(120 32 32)"/>

  <!-- Nucleus glow -->
  <circle cx="32" cy="32" r="9" fill="#0d1220"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.5"/>

  <!-- "B" lettermark in nucleus -->
  <text x="32" y="37"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="13"
        fill="#00ffff"
        text-anchor="middle"
        letter-spacing="-0.5">B</text>

  <!-- Electrons -->
  <circle cx="56" cy="32" r="2.2" fill="#00ffff"/>
  <circle cx="20.5" cy="22.5" r="2.2" fill="#8b5cf6"/>
  <circle cx="20.5" cy="41.5" r="2.2" fill="#00ffff"/>
</svg>
